<div class="app-container">
  <app-sidebar></app-sidebar>
  <div
    class="sidebar-backdrop"
    [class.active]="uiState.sidebarMobileActive()"
    (click)="uiState.closeSidebarMobile()"
  ></div>

  <div class="main-content" id="mainContent">
    <div class="m1-toolbar">
      <button
        class="btn btn-sm"
        title="Toggle Sidebar"
        (click)="uiState.toggleSidebar()"
      >
        <i class="fas fa-bars"></i>
      </button>
      <button
        class="btn btn-sm"
        title="Toggle theme"
        (click)="preferences.setDarkTheme(!preferences.darkTheme())"
      >
        @if (preferences.darkTheme()) {
        <i class="fas fa-sun"></i> Light } @else {
        <i class="fas fa-moon"></i> Dark }
      </button>
      <label class="btn btn-sm" title="Use per-signal custom colors">
        <input
          type="checkbox"
          [checked]="preferences.useCustomPalette()"
          (change)="preferences.setUseCustomPalette($any($event.target).checked)"
        />
        Custom Palette
      </label>
      <label class="btn btn-sm">
        <i class="fas fa-folder-open"></i> Open Local
        <input
          type="file"
          class="hidden"
          accept=".csv,.json,.gz"
          multiple
          style="display: none"
          (change)="fileLoaderInput($event)"
        />
      </label>
      <div class="view-mode-toggle">
        <button
          class="btn btn-sm"
          [class.active]="appState.viewMode() === 'stack'"
          (click)="setViewMode('stack')"
        >
          Stack
        </button>
        <button
          class="btn btn-sm"
          [class.active]="appState.viewMode() === 'overlay'"
          (click)="setViewMode('overlay')"
        >
          Overlay
        </button>
      </div>
      <button class="btn btn-sm" (click)="mathChannels.openModal()">
        <i class="fas fa-calculator"></i> Math Channel
      </button>
      <button class="btn btn-sm" (click)="dyno.openSetup()">
        <i class="fas fa-tachometer-alt"></i> Virtual Dyno
      </button>
      <button class="btn btn-sm" (click)="xy.openModal()">
        <i class="fas fa-braille"></i> XY Analysis
      </button>
      <button class="btn btn-sm" (click)="histogram.openModal()">
        <i class="fas fa-chart-bar"></i> Histogram
      </button>
      <label class="btn btn-sm map-toggle-btn">
        <input
          type="checkbox"
          [checked]="preferences.loadMap()"
          (change)="preferences.setLoadMap($any($event.target).checked)"
        />
        <i class="fas fa-map-marked-alt"></i> Show Map
      </label>
    </div>

    <app-chart-view></app-chart-view>
    <app-file-loader></app-file-loader>
  </div>
</div>

<app-loading-overlay></app-loading-overlay>
<app-math-channel-modal></app-math-channel-modal>
<app-dyno-modal></app-dyno-modal>
<app-xy-modal></app-xy-modal>
<app-histogram-modal></app-histogram-modal>
